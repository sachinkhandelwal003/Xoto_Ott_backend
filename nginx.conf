# Triple Minds Production Nginx Config
# Upload this to /etc/nginx/sites-available/ on your server
# Then symlink to /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name your-domain.com; # Replace with your actual domain

    # Increase upload size limit (fixes 413 Request Entity Too Large)
    client_max_body_size 2G; # Matches your Fastify server limit (2GB)

    # Proxy to your Fastify app
    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Increase timeout for large video uploads
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }
}

